stages:
  - build

variables:
IMAGE_NAME: $DOCKER_USER/pokeflip:latest

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $DOCKER_USER -p $DOCKER_PASS
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  only:
    - main
