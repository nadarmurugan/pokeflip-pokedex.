# 1. GLOBAL SETTINGS
# 'auto' automatically detects the number of CPU cores and creates worker processes accordingly.
worker_processes auto;

# 2. CONNECTION HANDLING
events {
    # Maximum number of simultaneous connections that can be opened by a worker process.
    worker_connections 1024;
}

# 3. HTTP CORE SETTINGS
http {
    # Maps file extensions to content types (e.g., .html -> text/html, .css -> text/css).
    include       /etc/nginx/mime.types;
    # The default type if a file's extension isn't recognized.
    default_type  application/octet-stream;

    # PERFORMANCE OPTIMIZATIONS
    # 'sendfile' enables efficient file transfer by copying data directly within the kernel.
    sendfile on;
    # 'tcp_nopush' sends the response header and file in one packet.
    tcp_nopush on;
    # 'tcp_nodelay' ensures small packets are sent immediately (lowers latency).
    tcp_nodelay on;
    # How long a connection remains open for subsequent requests from the same client.
    keepalive_timeout 65;
    # Optimization for the size of the internal hash table for types.
    types_hash_max_size 2048;

    # 4. SERVER BLOCK (The Virtual Host)
    server {
        # The container port Nginx listens on.
        listen 80;
        # '_' is a wildcard, meaning this server block handles requests for any domain name/IP.
        server_name _;

        # Where the PokéFlip files are stored inside the container.
        root /usr/share/nginx/html;
        # The default file to serve when a user visits the root domain.
        index index.html;

        # ROUTING
        location / {
            # Critical for Single Page Apps: checks if the file exists, 
            # otherwise redirects everything to index.html to let JavaScript handle it.
            try_files $uri /index.html;
        }

        # 5. SECURITY HEADERS
        # 'SAMEORIGIN' prevents your site from being embedded in an <iframe> on another site (Anti-Clickjacking).
        add_header X-Frame-Options "SAMEORIGIN";
        # Prevents the browser from trying to guess the MIME type (Security best practice).
        add_header X-Content-Type-Options "nosniff";
        # Enables the XSS filter built into most modern web browsers.
        add_header X-XSS-Protection "1; mode=block";

        # 6. GZIP COMPRESSION
        # Compresses files before sending them to the user to save bandwidth and speed up loading.
        gzip on;
        # Specific file types to compress.
        gzip_types text/plain text/css application/javascript application/json;
        # Don't waste CPU compressing tiny files (less than 256 bytes).
        gzip_min_length 256;

        # 7. CACHING STRATEGY
        # RegEx to match static assets (html, css, js).
        location ~* \.(html|css|js)$ {
            # Tells the user's browser to keep these files for 1 hour before asking for a new copy.
            expires 1h;
            # Marks the cache as 'public', allowing shared caches (like CDNs) to store it.
            add_header Cache-Control "public";
        }
    }
}

