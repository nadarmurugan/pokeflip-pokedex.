<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéFlip · Pokédex</title>
      <!-- Favicon - Pokeball PNG -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ----------------------------------------------
            PROFESSIONAL PRODUCTION BUILD · SMOOTH · GLOW · RESPONSIVE
        ------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0b0e14;
            --bg-deep: #05070c;
            --surface-glass: rgba(18, 22, 30, 0.7);
            --border-light: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.15);
            --text-primary: #f0f3fa;
            --text-muted: #8f9bb5;
            --card-shadow: 0 18px 30px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            --glow-spread: 0 0 18px rgba(255, 255, 255, 0.1);

            /* type colors (kept vivid) */
            --fire: #ff5533; --water: #2a7de1; --grass: #2e9a4a; --electric: #f5c542;
            --ice: #5ebed6; --fighting: #d3467a; --poison: #aa5dc9; --ground: #b8714b;
            --flying: #8dc6a7; --psychic: #f0699b; --bug: #c49c2b; --rock: #9e8e7b;
            --ghost: #7a60c2; --dragon: #2ac48a; --dark: #61717a; --steel: #7f929c;
            --fairy: #f0a3bf; --normal: #939393;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            font-smooth: always;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        /* ===== LUXURY POKEBALL BACKGROUND (SVG + GRADIENTS) ===== */
        .bg-layers {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 30% 40%, rgba(40, 55, 100, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(120, 60, 50, 0.15) 0%, transparent 45%),
                        var(--bg-deep);
        }

        .pokeball-glow {
            position: absolute;
            width: 80vmin;
            height: 80vmin;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.2"/><path d="M3 50H97" stroke="rgba(255,255,255,0.08)" stroke-width="2.2"/><circle cx="50" cy="50" r="13" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.2"/><circle cx="50" cy="50" r="6" fill="rgba(255,255,255,0.15)"/><path d="M3 50A47 47 0 0 1 97 50" fill="rgba(255,255,255,0.02)"/></svg>') center/contain no-repeat;
            opacity: 0.4;
            filter: blur(8px) drop-shadow(0 0 14px rgba(255,70,70,0.3));
            animation: breathe 12s ease-in-out infinite;
        }

        .bg-layers::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.45; transform: translate(-50%, -50%) scale(1.03); }
        }

        /* ---- micro pokeballs (floating) ---- */
        .float-ball {
            position: absolute;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/><path d="M3 50H97" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/><circle cx="50" cy="50" r="13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/><circle cx="50" cy="50" r="6" fill="rgba(255,255,255,0.2)"/></svg>') center/contain no-repeat;
            width: 22vmin;
            height: 22vmin;
            opacity: 0.1;
            filter: blur(2px);
            pointer-events: none;
        }
        .ball1 { top: 2%; left: 2%; animation: drift 25s infinite alternate; }
        .ball2 { bottom: -5%; right: 0%; width: 40vmin; height: 40vmin; opacity: 0.05; animation: drift 30s infinite reverse; }
        .ball3 { top: 20%; right: 12%; width: 15vmin; height: 15vmin; opacity: 0.08; animation: drift 18s infinite; }
        @keyframes drift { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(4%, 6%) rotate(8deg); } }

        /* ===== HEADER WITH POKEBALL LOGO (VECTOR) ===== */
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.2rem 2rem 0.5rem;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem 1.2rem;
            flex-wrap: wrap;
        }
        .premium-pokeball {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 12px rgba(255, 70, 70, 0.6));
            transition: filter 0.3s;
        }
        .premium-pokeball svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 0 4px white);
        }
        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 4.8rem);
            letter-spacing: 12px;
            background: linear-gradient(135deg, #f2f5ff 0%, #c0c8e0 80%);
            -webkit-background-clip: text;
             background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            text-shadow: 0 0 18px rgba(255,255,240,0.3);
        }
        .subhead {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 8px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            word-spacing: 6px;
        }

        /* ===== CONTROLS (glass, smooth) ===== */
        .controls {
            max-width: 1400px;
            margin: 1.6rem auto 0;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.4rem;
        }
        .search-wrap {
            position: relative;
            width: 100%;
            max-width: 520px;
            backdrop-filter: blur(4px);
        }
        .search-wrap svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
        }
        .search-bar {
            width: 100%;
            padding: 16px 22px 16px 52px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            background: var(--surface-glass);
            color: white;
            font-size: 1rem;
            font-weight: 400;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
            transition: all 0.2s;
            outline: none;
        }
        .search-bar:focus {
            border-color: rgba(255,255,255,0.25);
            background: rgba(25, 30, 40, 0.9);
            box-shadow: 0 0 0 2px rgba(255,215,100,0.2), 0 8px 25px -8px #000;
        }
        .search-bar::placeholder { color: rgba(200,210,240,0.3); font-weight: 300; }

        .filter-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            width: 100%;
            padding: 6px 0 14px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-nav::-webkit-scrollbar { height: 3px; }
        .filter-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .type-btn {
            padding: 8px 22px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: rgba(15, 20, 28, 0.6);
            backdrop-filter: blur(6px);
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 1.8px;
            transition: 0.2s;
            white-space: nowrap;
            font-family: 'Space Mono', monospace;
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.4);
        }
        .type-btn:hover {
            color: white;
            border-color: rgba(255,255,255,0.3);
            background: rgba(35, 45, 60, 0.8);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .type-btn.active {
            background: white;
            color: #0b0e14;
            border-color: white;
            font-weight: 800;
            box-shadow: 0 0 22px rgba(255,255,255,0.3);
        }

        /* ===== MAIN GRID (lazy load ready) ===== */
        main {
            max-width: 1440px;
            margin: 2rem auto 5rem;
            padding: 0 2rem;
        }
        .result-info {
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .result-info b { color: white; font-weight: 600; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        /* ===== CARD ===== */
        .card {
            height: 500px;
            perspective: 1400px;
            cursor: pointer;
            animation: fadeScale 0.45s cubic-bezier(0.2,0.9,0.3,1) both;
            will-change: transform;
        }
        @keyframes fadeScale {
            0% { opacity: 0; transform: translateY(24px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1.2);
            transform-style: preserve-3d;
            border-radius: 28px;
            box-shadow: var(--card-shadow), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 28px;
            overflow: hidden;
        }

        /* front side: vivid glow, more texture */
        .card-front {
            background: linear-gradient(145deg, rgba(28,32,42,0.95) 0%, rgba(18,22,32,0.98) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 0 1.2rem 1.8rem;
            backdrop-filter: blur(2px);
            border-color: #484848;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
        }

        .card-glow {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 40%, var(--tc), transparent 70%);
            opacity: 0.2;
            mix-blend-mode: overlay;
            transition: opacity 0.3s;
        }
        .card:hover .card-glow { opacity: 0.35; }

        .card-pokeball-watermark {
            position: absolute;
            top: -20px; right: -20px;
            width: 140px; height: 140px;
            opacity: 0.1;
            pointer-events: none;
            transform: rotate(15deg);
        }
        .card-num {
            position: absolute;
            top: 18px; left: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            z-index: 3;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .type-badge {
            position: absolute;
            top: 14px; right: 18px;
            background: var(--tc);
            color: #111;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            font-weight: 800;
            letter-spacing: 1.8px;
            padding: 5px 12px;
            border-radius: 40px;
            text-transform: uppercase;
            z-index: 4;
            box-shadow: 0 0 16px var(--tc);
        }

        .pkmn-img {
            width: 280px; height: 280px;
            object-fit: contain;
            position: relative; z-index: 5;
            margin-bottom: 0.8rem;
            filter: drop-shadow(0 2px 4px black) drop-shadow(0 0 2px var(--tc)); /* REDUCED GLOW */
            transition: transform 0.3s ease, filter 0.3s;
            display: block;
            image-rendering: crisp-edges;
            will-change: transform;
        }
        .card:hover .pkmn-img {
            transform: translateY(-10px) scale(1.08);
            filter: drop-shadow(0 6px 10px black) drop-shadow(0 0 4px var(--tc)); /* REDUCED GLOW */
        }

        .card-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.1rem;
            letter-spacing: 5px;
            color: white;
            z-index: 2; line-height: 1.1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
        .card-type-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem; letter-spacing: 4px;
            color: var(--tc); margin-top: 2px; z-index: 2;
            text-transform: uppercase;
        }
        .flip-hint {
            position: absolute; bottom: 14px; right: 18px;
            font-size: 0.5rem; color: rgba(255,255,255,0.2);
            font-family: 'Space Mono', monospace; letter-spacing: 1.2px;
        }

        /* ===== CARD BACK (clean stats, borders with glow) ===== */
        .card-back {
            background: #0f131c;
            transform: rotateY(180deg);
            padding: 1.3rem 1.2rem 1.2rem;
            display: flex; flex-direction: column;
            border: 1px solid var(--tc);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 14px var(--tc); /* REDUCED */
            backdrop-filter: blur(5px);
        }

        .back-header {
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px; margin-bottom: 10px;
        }
        .back-img {
            width: 48px; height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 6px black);
        }
        .back-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem; letter-spacing: 2px;
            line-height: 1;
        }
        .back-type-badge {
            font-family:'Space Mono',monospace; font-size:0.5rem; font-weight:700;
            letter-spacing:1.2px; padding:3px 10px; border-radius:30px;
            background:var(--tc); color:#000; text-transform:uppercase;
        }
        .back-id {
            margin-left: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem; color: var(--text-muted);
        }

        .label {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase; letter-spacing: 2.5px;
            color: var(--tc);
            margin-top: 10px; margin-bottom: 5px;
            font-weight: 500;
        }

        .stats { display: flex; flex-direction: column; gap: 5px; }
        .stat-row { display: flex; align-items: center; gap: 6px; }
        .stat-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem; color: var(--text-muted);
            letter-spacing: 1px; width: 42px;
            text-align: right; flex-shrink: 0;
        }
        .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem; color: white;
            width: 26px; text-align: right; flex-shrink: 0;
        }
        .stat-bar-bg {
            flex: 1; height: 5px;
            border-radius: 12px;
            background: rgba(30,40,60,0.7); overflow: hidden;
            box-shadow: inset 0 1px 3px black;
        }
        .stat-bar {
            height: 100%; border-radius: 12px;
            background: var(--tc);
            box-shadow: 0 0 6px var(--tc);
        }

        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
        .chip {
            padding: 3px 10px; border-radius: 30px;
            font-size: 0.6rem; font-weight: 500;
            border: 1px solid var(--border-light); color: #ddd;
            background: rgba(255,255,255,0.04);
        }
        .chip.adv { border-color: var(--tc); color: var(--tc); background: rgba(0,0,0,0.4); }

        .fact-box {
            margin-top: auto;
            padding: 10px 14px; border-radius: 16px;
            background: rgba(0,0,0,0.35);
            border-left: 3px solid var(--tc);
            font-size: 0.7rem; line-height: 1.5;
            color: rgba(230,240,255,0.7);
            backdrop-filter: blur(2px);
        }

        [data-type="fire"]     { --tc: var(--fire); }
        [data-type="water"]    { --tc: var(--water); }
        [data-type="grass"]    { --tc: var(--grass); }
        [data-type="electric"] { --tc: var(--electric); }
        [data-type="ice"]      { --tc: var(--ice); }
        [data-type="fighting"] { --tc: var(--fighting); }
        [data-type="poison"]   { --tc: var(--poison); }
        [data-type="ground"]   { --tc: var(--ground); }
        [data-type="flying"]   { --tc: var(--flying); }
        [data-type="psychic"]  { --tc: var(--psychic); }
        [data-type="bug"]      { --tc: var(--bug); }
        [data-type="rock"]     { --tc: var(--rock); }
        [data-type="ghost"]    { --tc: var(--ghost); }
        [data-type="dragon"]   { --tc: var(--dragon); }
        [data-type="dark"]     { --tc: var(--dark); }
        [data-type="steel"]    { --tc: var(--steel); }
        [data-type="fairy"]    { --tc: var(--fairy); }
        [data-type="normal"]   { --tc: var(--normal); }

        .empty {
            grid-column: 1/-1; text-align: center;
            padding: 5rem; color: var(--text-muted);
            font-family: 'Space Mono', monospace; font-size: 0.85rem;
        }

        /* extra micro-optimisations */
        @media (max-width: 640px) {
            .controls, main { padding-left: 1rem; padding-right: 1rem; }
            .filter-nav { flex-wrap: nowrap; justify-content: flex-start; }
            .grid { gap: 1.2rem; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); }
            .card { height: 440px; }
            .pkmn-img { width: 280px; height: 280px; }
            .logo-text { letter-spacing: 6px; }
        }
        @media (max-width: 420px) {
            .card { height: 420px; }
        }
        /* force smooth webkit */
        .card, .card-inner, .pkmn-img { -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    </style>
</head>

    <div class="header-container">
        <header>
          <div class="logo-wrapper">
    <!-- Premium vector pokeball logo as PNG -->
    <div class="premium-pokeball">

</div>
            <div class="subhead">GRAND ELEMENTAL INDEX</div>
        </header>

    <div class="controls">
        <div class="search-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

        <div class="grid" id="cardGrid"></div>
    </main>

                25:{hp:35,atk:55,def:40,spa:50,spd:50,spe:90},135:{hp:65,atk:65,def:60,spa:110,spd:95,spe:130},
                150:{hp:106,atk:110,def:90,spa:154,spd:90,spe:130},196:{hp:65,atk:65,def:60,spa:130,spd:95,spe:110},
                144:{hp:90,atk:85,def:100,spa:95,spd:125,spe:85},471:{hp:65,atk:60,def:110,spa:130,spd:95,spe:65},
                448:{hp:70,atk:110,def:70,spa:115,spd:70,spe:90},68:{hp:90,atk:130,def:80,spa:65,spd:85,spe:55},
                94:{hp:60,atk:65,def:60,spa:130,spd:75,spe:110},609:{hp:60,atk:55,def:90,spa:145,spd:90,spe:80},
                149:{hp:91,atk:134,def:95,spa:100,spd:100,spe:80},612:{hp:76,atk:147,def:90,spa:60,spd:70,spe:97},
                34:{hp:81,atk:92,def:77,spa:85,spd:75,spe:85},323:{hp:70,atk:100,def:70,spa:105,spd:75,spe:40},
                197:{hp:95,atk:65,def:110,spa:60,spd:130,spe:65},248:{hp:100,atk:134,def:110,spa:95,spd:100,spe:61},
                212:{hp:70,atk:130,def:100,spa:55,spd:80,spe:65},376:{hp:80,atk:135,def:130,spa:95,spd:90,spe:70},
                700:{hp:95,atk:65,def:65,spa:110,spd:130,spe:60},39:{hp:115,atk:45,def:20,spa:45,spd:25,spe:20},
                143:{hp:160,atk:110,def:65,spa:65,spd:110,spe:30},18:{hp:83,atk:80,def:75,spa:70,spd:70,spe:101}
            };

            const pokedex = [
                {id:6,name:"Charizard",type:"fire",adv:["Grass","Ice","Bug","Steel"],dis:["Water","Rock","Ground"],fact:"Spits fire hot enough to melt boulders."},
                {id:157,name:"Typhlosion",type:"fire",adv:["Steel","Bug","Grass","Ice"],dis:["Ground","Water","Rock"],fact:"Rubs blazing fur to create massive explosions."},
                {id:9,name:"Blastoise",type:"water",adv:["Fire","Ground","Rock"],dis:["Electric","Grass"],fact:"Water jets punch through thick steel."},
                {id:131,name:"Lapras",type:"water",adv:["Dragon","Flying","Rock"],dis:["Electric","Grass","Fighting"],fact:"Gentle heart, once nearly extinct."},
                {id:3,name:"Venusaur",type:"grass",adv:["Water","Rock","Ground"],dis:["Fire","Flying","Ice","Poison"],fact:"Flower absorbs solar rays."},
                {id:154,name:"Meganium",type:"grass",adv:["Ground","Water","Rock"],dis:["Poison","Bug","Fire"],fact:"Breath revives dead grass."},
                {id:25,name:"Pikachu",type:"electric",adv:["Water","Flying"],dis:["Ground"],fact:"Raises tail to sense surroundings."},
                {id:135,name:"Jolteon",type:"electric",adv:["Flying","Water"],dis:["Ground"],fact:"Shoots sharp fur like needles."},
                {id:150,name:"Mewtwo",type:"psychic",adv:["Fighting","Poison"],dis:["Dark","Ghost","Bug"],fact:"Most savage heart among Pokémon."},
                {id:196,name:"Espeon",type:"psychic",adv:["Fighting","Poison"],dis:["Bug","Dark","Ghost"],fact:"Predicts enemy's next move."},
                {id:144,name:"Articuno",type:"ice",adv:["Dragon","Ground","Flying","Grass"],dis:["Fire","Rock","Steel","Fighting"],fact:"Appears to doomed people."},
                {id:471,name:"Glaceon",type:"ice",adv:["Grass","Flying","Dragon"],dis:["Fighting","Steel","Fire"],fact:"Creates diamond-dust flurry."},
                {id:448,name:"Lucario",type:"fighting",adv:["Ice","Normal","Rock","Steel"],dis:["Psychic","Ground","Flying"],fact:"Understands human speech."},
                {id:68,name:"Machamp",type:"fighting",adv:["Steel","Rock","Ice","Normal"],dis:["Fairy","Flying","Psychic"],fact:"1000 punches per second."},
                {id:94,name:"Gengar",type:"ghost",adv:["Psychic","Ghost"],dis:["Dark","Ground"],fact:"Temperature drops 10° near it."},
                {id:609,name:"Chandelure",type:"ghost",adv:["Bug","Grass","Psychic"],dis:["Water","Ground","Dark"],fact:"Spirits burn forever."},
                {id:149,name:"Dragonite",type:"dragon",adv:["Dragon"],dis:["Ice","Fairy"],fact:"Guides shipwrecked crews."},
                {id:612,name:"Haxorus",type:"dragon",adv:["Dragon"],dis:["Ice","Fairy"],fact:"Tusks cut steel beams."},
                {id:34,name:"Nidoking",type:"ground",adv:["Electric","Fire","Poison","Rock"],dis:["Water","Ice","Grass"],fact:"Shatters bones with tail."},
                {id:323,name:"Camerupt",type:"ground",adv:["Poison","Steel","Electric","Fire"],dis:["Water","Ground","Ice"],fact:"Magma 18,000°F."},
                {id:197,name:"Umbreon",type:"dark",adv:["Ghost","Psychic"],dis:["Fighting","Fairy","Bug"],fact:"Moon aura rings glow."},
                {id:248,name:"Tyranitar",type:"dark",adv:["Psychic","Ghost"],dis:["Fighting","Water","Ground"],fact:"Topples mountains."},
                {id:212,name:"Scizor",type:"steel",adv:["Ice","Fairy","Rock","Grass"],dis:["Fire"],fact:"Pincers crush anything."},
                {id:376,name:"Metagross",type:"steel",adv:["Rock","Ice","Fairy","Grass"],dis:["Ground","Fire"],fact:"Four brains supercomputer."},
                {id:700,name:"Sylveon",type:"fairy",adv:["Dragon","Fighting","Dark"],dis:["Poison","Steel"],fact:"Soothing aura calms fights."},
                {id:39,name:"Jigglypuff",type:"fairy",adv:["Dark","Dragon","Fighting"],dis:["Steel","Poison"],fact:"Inflates to sing lullabies."},
                {id:143,name:"Snorlax",type:"normal",adv:[],dis:["Fighting"],fact:"Digests anything, 900 lbs/day."},
                {id:18,name:"Pidgeot",type:"flying",adv:["Bug","Grass","Fighting"],dis:["Electric","Rock","Ice"],fact:"Skims at 1500 mph."}
            ];

            const grid = document.getElementById('cardGrid');
            const nav = document.getElementById('filterNav');
            const countEl = document.getElementById('totalCount');
            let currentFilter = 'all', searchTerm = '';

            // create type filters
            [...new Set(pokedex.map(p => p.type))].sort().forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'type-btn';
                btn.textContent = t;
                btn.onclick = (e) => filterData(t, e.target);
                nav.appendChild(btn);
            });

            window.handleSearch = function() {
                searchTerm = document.getElementById('search').value.toLowerCase().trim();
                render(getFiltered());
            };

            window.filterData = function(type, btn) {
                currentFilter = type;
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                render(getFiltered());
            };

            function getFiltered() {
                return pokedex.filter(p =>
                    (currentFilter === 'all' || p.type === currentFilter) &&
                    (!searchTerm || p.name.toLowerCase().includes(searchTerm))
                );
            }

            function statRow(label, val, max=160) {
                const pct = Math.min(100, Math.round(val / max * 100));
                return `<div class="stat-row"><span class="stat-name">${label}</span><span class="stat-val">${val}</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%"></div></div></div>`;
            }

            // small pokeball svg for watermark
            const pokeballWatermark = `<svg viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="3"><circle cx="50" cy="50" r="47"/><path d="M3 50H97"/><circle cx="50" cy="50" r="13"/><circle cx="50" cy="50" r="6" fill="white"/></svg>`;

            function render(data) {
                countEl.textContent = data.length;
                if (!data.length) { grid.innerHTML = '<div class="empty">⚠️ NO POKÉMON FOUND</div>'; return; }

                const fragment = document.createDocumentFragment();
                data.forEach((p, i) => {
                    const s = baseStats[p.id] || {hp:60,atk:60,def:60,spa:60,spd:60,spe:60};
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.type = p.type;
                    card.style.animationDelay = `${i * 30}ms`;

                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-glow"></div>
                                <div class="card-pokeball-watermark">${pokeballWatermark}</div>
                                <span class="card-num">#${String(p.id).padStart(3,'0')}</span>
                                <div class="type-badge">${p.type}</div>
                                <img class="pkmn-img" loading="lazy"
                                     src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
                                     alt="${p.name}">
                                <div class="card-name">${p.name.toUpperCase()}</div>
                                <div class="card-type-label">${p.type} TYPE</div>
                                <div class="flip-hint">↻ FLIP</div>
                            </div>
                            <div class="card-back">
                                <div class="back-header">
                                    <img class="back-img" loading="lazy"
                                         src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"
                                         alt="${p.name}">
                                    <span class="back-name">${p.name}</span>
                                    <span class="back-type-badge">${p.type}</span>
                                    <span class="back-id">#${String(p.id).padStart(3,'0')}</span>
                                </div>
                                <div class="label">base stats</div>
                                <div class="stats">
                                    ${statRow('HP',s.hp)}${statRow('ATK',s.atk)}${statRow('DEF',s.def)}
                                    ${statRow('SPA',s.spa)}${statRow('SPD',s.spd)}${statRow('SPE',s.spe)}
                                </div>
                                <div class="label">strong vs</div>
                                <div class="chip-group">${p.adv.length?p.adv.map(a=>`<span class="chip adv">${a}</span>`).join(''):'<span class="chip">—</span>'}</div>
                                <div class="label">weak to</div>
                                <div class="chip-group">${p.dis.map(d=>`<span class="chip">${d}</span>`).join('')}</div>
                                <div class="fact-box">${p.fact}</div>
                            </div>
                        </div>`;

                    card.addEventListener('click', () => card.classList.toggle('flipped'));
                    fragment.appendChild(card);
                });

                grid.innerHTML = '';
                grid.appendChild(fragment);
            }

            render(pokedex);
        })();
    </script>
</body>
